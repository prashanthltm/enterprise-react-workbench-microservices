apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: <acr-name>.azurecr.io/userservice:latest
          ports:
            - containerPort: 8080
          env:
            - name: KeyVault__VaultUri
              value: "https://<keyvault-name>.vault.azure.net/"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 5002
      targetPort: 8080
  type: ClusterIP
