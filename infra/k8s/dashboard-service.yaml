apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: <acr-name>.azurecr.io/dashboardservice:latest
          ports:
            - containerPort: 8080
          env:
            - name: KeyVault__VaultUri
              value: "https://<keyvault-name>.vault.azure.net/"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  selector:
    app: dashboard-service
  ports:
    - port: 5003
      targetPort: 8080
  type: ClusterIP
